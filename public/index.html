<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TOBYDROP | elite skins</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="auth-screen" class="auth-full">
        <div class="auth-box">
            <div class="auth-logo">TOBY<span>DROP</span></div>
            <p>Welcome to the ultimate virtual portal.</p>
            <input id="user" type="text" placeholder="Username">
            <input id="pass" type="password" placeholder="Password">
            <div class="auth-actions">
                <button onclick="auth('login')" class="btn-primary">LOGIN</button>
                <button onclick="auth('register')" class="btn-secondary">REGISTER</button>
            </div>
        </div>
    </div>

    <div id="game-screen" style="display:none">
        <header class="top-nav">
            <div class="brand">TOBY<span>DROP</span></div>
            <nav>
                <button onclick="showHome()" class="nav-link active">CASES</button>
                <button onclick="switchTab('battles-tab', this)" class="nav-link">BATTLES</button>
                <button onclick="switchTab('settings-tab', this)" class="nav-link">SETTINGS</button>
            </nav>
            <div class="nav-user">
                <div class="balance-display"><small>BALANCE</small><span id="balance">$0.00</span></div>
                <div class="pfp-wrap">
                    <img id="user-avatar-top" src="">
                    <div class="pfp-dropdown" onclick="logout()">LOGOUT</div>
                </div>
            </div>
        </header>

        <div class="app-body">
            <main class="main-content">
                <section id="home-tab" class="tab-view">
                    <div class="view-header">SELECT A CASE</div>
                    <div class="case-grid">
                        <div class="case-card tier-1" onclick="selectCase('starter')"><h3>Starter</h3><p>$50</p></div>
                        <div class="case-card tier-2" onclick="selectCase('elite')"><h3>Elite</h3><p>$250</p></div>
                        <div class="case-card tier-3" onclick="selectCase('toby')"><h3>Toby Special</h3><p>$1000</p></div>
                    </div>
                </section>

                <section id="opening-tab" class="tab-view" style="display:none">
                    <div class="opening-controls">
                        <button onclick="showHome()" class="btn-back">← BACK</button>
                        <h2 id="case-title">CASE</h2>
                    </div>
                    <div class="spinner-wrapper">
                        <div class="spinner-container" id="main-view"><div class="pointer"></div><div id="spinner" class="spinner-track"></div></div>
                        <button id="open-btn" class="btn-open" onclick="openCase()">OPEN CASE</button>
                    </div>
                    <div class="preview-section">
                        <h3>CASE CONTENTS</h3>
                        <div class="preview-list" id="preview-items"></div>
                    </div>
                </section>

                <section id="battles-tab" class="tab-view" style="display:none">
                    <div class="battle-lobby">
                        <div class="lobby-header">
                            <h2>BATTLE LOBBY</h2>
                            <div class="lobby-create">
                                <select id="battle-case-select"><option value="starter">Starter ($50)</option><option value="elite">Elite ($250)</option><option value="toby">Toby ($1000)</option></select>
                                <button onclick="createBattle()" class="btn-primary">NEW BATTLE</button>
                            </div>
                        </div>
                        <div id="battle-list" class="battle-list"></div>
                    </div>
                </section>

                <section id="arena-tab" class="tab-view" style="display:none">
                    <div class="arena">
                        <h1 id="battle-msg">FIGHT!</h1>
                        <div class="battle-lanes">
                            <div class="lane">
                                <div class="lane-header"><img id="p1-ava" src=""> <b id="p1-name">P1</b></div>
                                <div class="spinner-container sm"><div class="pointer"></div><div id="p1-spinner" class="spinner-track"></div></div>
                            </div>
                            <div class="lane">
                                <div class="lane-header"><img id="p2-ava" src=""> <b id="p2-name">P2</b></div>
                                <div class="spinner-container sm"><div class="pointer"></div><div id="p2-spinner" class="spinner-track"></div></div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="settings-tab" class="tab-view" style="display:none">
                    <div class="settings-card">
                        <h2>SETTINGS</h2>
                        <div class="settings-avatar">
                            <img id="settings-avatar-prev" src="">
                            <button class="btn-secondary" onclick="document.getElementById('avatar-input').click()">CHANGE IMAGE</button>
                            <input type="file" id="avatar-input" accept="image/*" hidden>
                        </div>
                        <button class="btn-primary" onclick="uploadAvatar()" style="width: 100%">SAVE PROFILE</button>
                    </div>
                </section>
            </main>

            <aside class="chat-sidebar">
                <div class="chat-title">COMMUNITY</div>
                <div id="chat-msgs"></div>
                <div class="chat-input-area">
                    <input id="chat-input" type="text" placeholder="Type here...">
                </div>
            </aside>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
